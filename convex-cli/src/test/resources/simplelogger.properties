# SLF4J Simple Logger configuration for tests
# Suppress INFO noise, show WARN and above

# Default logging level for all loggers
org.slf4j.simpleLogger.defaultLogLevel=warn

# Suppress noisy libraries
org.slf4j.simpleLogger.log.io.javalin=warn
org.slf4j.simpleLogger.log.org.eclipse.jetty=warn
org.slf4j.simpleLogger.log.convex.peer.Server=warn
org.slf4j.simpleLogger.log.convex.peer.ConnectionManager=warn
org.slf4j.simpleLogger.log.io.netty=warn
org.slf4j.simpleLogger.log.convex.gui=warn

# Show short logger name
org.slf4j.simpleLogger.showShortLogName=true
org.slf4j.simpleLogger.showThreadName=true

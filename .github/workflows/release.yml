# .github/workflows/release.yml
# Creates a GitHub Release with convex.jar when a version tag is pushed,
# then builds and pushes the Docker images for the release.
#
# Docker must be a job here rather than a `release: [published]` trigger in
# docker.yml: releases created with the workflow's GITHUB_TOKEN do not fire
# workflow events (GitHub's recursion guard), so such a trigger never runs.
name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
          cache: maven

      - name: Build with tests
        run: mvn -B clean install

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          CHANGELOG=$(awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$CHANGELOG" ]; then
            echo "::error::No CHANGELOG.md section found for [$VERSION]. Rename the [X.Y.Z-SNAPSHOT] heading to [$VERSION] with a release date before tagging."
            exit 1
          fi
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            convex-integration/target/convex.jar
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t "convexlive/convex:${{ github.ref_name }}" -t convexlive/convex:latest .

      - name: Push Docker images
        run: |
          docker push "convexlive/convex:${{ github.ref_name }}"
          docker push convexlive/convex:latest

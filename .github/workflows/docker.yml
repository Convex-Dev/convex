# .github/workflows/docker.yml
# Manually builds and pushes a Docker image to Docker Hub (e.g. snapshot builds,
# or re-publishing a release tag ad hoc).
#
# Release images are built automatically by the `docker` job in release.yml.
# Do NOT add a `release: [published]` trigger here: releases created with the
# workflow GITHUB_TOKEN do not fire workflow events, so it would never run.
name: Docker

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: true
        default: 'snapshot'

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t "convexlive/convex:${{ github.event.inputs.tag }}" .

      - name: Push Docker image
        run: docker push "convexlive/convex:${{ github.event.inputs.tag }}"
